services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: ./api/.env
    environment:
      - DB_PATH=/app/data/jobs.db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG_MODE=false
    volumes:
      - ./frontend:/app/frontend:ro
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: ./worker
    env_file: ./worker/.env
    environment:
      - DB_PATH=/app/data/jobs.db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG_MODE=false
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis
    profiles:
      - debug

volumes:
  redis_data:
