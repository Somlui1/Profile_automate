services:
  redis:
    image: redis:7-alpine
    environment:
      - TZ=Asia/Bangkok
    # Exposing Redis port to host is useful for local development and debugging.
    # For production, consider commenting out this ports block so Redis is only accessible
    # internally within the Docker bridge network.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    ports:
      - "8000:8000"
    env_file: ./.env
    environment:
      - TZ=Asia/Bangkok
      - DB_PATH=/app/data/jobs.db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG_MODE=false
    volumes:
      # Developer volume mount for active development (allows live code edits to be visible).
      # IMPORTANT: Comment out the frontend volume mount below in production deployment
      # so that the container serves the optimized build bundled during docker build.
      # - ./frontend:/app/frontend:ro
      - ./data:/app/data
      # Kerberos mounts (required for production Kerberos auth)
      # Note: Comment these out if running locally without Kerberos setup
      - /opt/keytabs/HTTP.keytab:/etc/security/keytabs/HTTP.keytab:ro
      - /etc/krb5.conf:/etc/krb5.conf:ro
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: ./worker
    env_file: ./.env
    environment:
      - TZ=Asia/Bangkok
      - DB_PATH=/app/data/jobs.db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG_MODE=false
    volumes:
      - ./data:/app/data
      # Kerberos mounts (required for production Kerberos auth)
      # Note: Comment these out if running locally without Kerberos setup
      - /opt/keytabs/HTTP.keytab:/etc/security/keytabs/HTTP.keytab:ro
      - /etc/krb5.conf:/etc/krb5.conf:ro
    depends_on:
      redis:
        condition: service_healthy

  redis-insight:
    image: redis/redisinsight:latest
    environment:
      - TZ=Asia/Bangkok
    ports:
      - "5540:5540"
    depends_on:
      - redis
    profiles:
      - debug

volumes:
  redis_data:
